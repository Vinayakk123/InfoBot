services:
  infobot:
    build:
      context: .
      dockerfile: Dockerfile
    image: infobot-rag-chatbot:local
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      # Persisted FAISS index — avoids rebuilding it on every rebuild/restart.
      - ./faiss_store:/app/faiss_store
      # Source documents — lets you add/edit files without rebuilding the image.
      - ./data:/app/data
      # Persisted chat history (must already exist as a file on the host).
      - ./chat_history.json:/app/chat_history.json
      # Caches the sentence-transformers embedding model so it isn't
      # re-downloaded from Hugging Face every time the container is recreated.
      - hf-cache:/home/appuser/.cache/huggingface
    restart: unless-stopped

volumes:
  hf-cache:
